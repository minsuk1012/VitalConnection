<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
          * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; position: relative; background: var(--bg-color); }

  /* 누끼 모델 — 우측 하단 정렬, contain */
  .model {
    position: absolute; right: 0; bottom: 0;
    width: var(--model-width);
    object-fit: contain; object-position: right bottom;
  }
  /* 좌측 텍스트 영역 가독성용 페이드 */
  .fade {
    position: absolute; inset: 0;
    background: linear-gradient(to right, var(--bg-color) var(--fade-stop), transparent 75%);
  }
  /* 텍스트 스택 — 좌측 */
  .stack {
    position: absolute;
    left: var(--text-left); top: var(--text-top);
    display: flex; flex-direction: column; gap: var(--stack-gap);
  }
  .logo-ko {
    font-family: 'Noto'; font-size: 13px;
    color: var(--text-color); opacity: 0.65;
    display: {{BRAND_KO_DISPLAY}}
  }
  .logo-en {
    font-family: 'Bebas'; font-size: var(--brand-size);
    color: var(--text-color); letter-spacing: 3px;
  }
  .brand-img {
    font-family: 'Noto'; font-size: var(--brand-img-size);
    color: var(--accent-color); font-style: italic; font-weight: 700;
    display: {{TAGLINE_DISPLAY}}
  }
  .subheadline {
    font-family: 'Noto'; font-size: var(--sub-size);
    color: var(--text-color); opacity: 0.8; line-height: 1.5;
    display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
    margin-top: var(--sub-margin-top, 0px);
  }
  .headline {
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal); font-size: var(--headline-size);
    font-weight: 900; color: var(--text-color);
    line-height: var(--headline-line-height);
    word-break: keep-all; max-width: var(--text-max-width);
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}
  .price-label {
    font-family: 'Noto'; font-size: var(--price-label-size);
    color: var(--text-color); opacity: 0.7;
    display: {{PRICE_DISPLAY}}
  }
  .price-value {
    font-family: 'Bebas'; font-size: var(--price-size);
    color: var(--text-color); letter-spacing: 1px;
    display: {{PRICE_DISPLAY}}
  }
  .price-unit {
    font-family: 'Noto'; font-size: calc(var(--price-size) * 0.35);
    color: var(--text-color); margin-left: 4px; opacity: 0.8; vertical-align: middle;
  }

  }
  /* 우하단 앰버서더 표기 */
  .ambassador {
    position: absolute; right: 24px; bottom: 20px;
    font-family: 'Noto'; font-size: 12px;
    color: var(--text-color); opacity: 0.45; text-align: right;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <img class="model" src="{{MODEL_PATH}}" id="model-img">
  <div class="fade"></div>
  <div class="stack">
    <div class="logo-ko" id="brand-ko">{{BRAND_KO}}</div>
    <div class="logo-en" id="brand-en">{{BRAND_EN}}</div>
    <div class="brand-img" id="tagline">{{TAGLINE}}</div>
    <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
    <div class="headline" id="headline">{{HEADLINE}}</div>
    <div class="price-label">{{PRICE}} {{PRICE_UNIT}}</div>
    <div class="price-value" id="price">{{PRICE}}<span class="price-unit">{{PRICE_UNIT}}</span></div>
  </div>
  <div class="ambassador" id="badge">{{BADGE_TEXT}}</div>
</body>
</html>
