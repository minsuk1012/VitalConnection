<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
          * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; position: relative; }

  .model {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  /* 대각선 분할 패널 (글래스모피즘 효과 추가) */
  .dark-panel {
    position: absolute; inset: 0;
    background: var(--panel-color);
    opacity: var(--panel-opacity);
    clip-path: polygon(0 var(--panel-left-y), 100% var(--panel-right-y), 100% 100%, 0 100%);
    backdrop-filter: blur(var(--panel-blur, 12px));
    -webkit-backdrop-filter: blur(var(--panel-blur, 12px));
  }

  /* 고급스러운 평행 오프셋 라인 (Accent Line) */
  .accent-line {
    position: absolute; inset: 0;
    pointer-events: none;
    background: var(--accent-color, rgba(255,255,255,0.35));
    clip-path: polygon(
      0 calc(var(--panel-left-y) - 15px), 
      100% calc(var(--panel-right-y) - 15px), 
      100% calc(var(--panel-right-y) - 13px), 
      0 calc(var(--panel-left-y) - 13px)
    );
  }
  .text-area {
    position: absolute;
    left: var(--text-left); right: var(--text-left);
    top: var(--text-top); bottom: 32px;
  }
  .subheadline {
    font-family: 'Noto'; font-size: var(--sub-size);
    color: white; opacity: var(--sub-opacity);
    margin-bottom: 6px; display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
    margin-top: var(--sub-margin-top, 0px);
  }
  .tagline {
    font-family: 'Noto'; font-size: var(--tag-size);
    color: white; opacity: var(--tag-opacity);
    margin-bottom: 16px; display: {{TAGLINE_DISPLAY}}}};
    rotate: var(--tagline-rotation, 0deg);
  }
  .divider {
    width: 100%; height: 1px;
    background: rgba(255,255,255,var(--divider-opacity));
    margin-bottom: 20px;
  }
  .outline-badge {
    display: inline-block;
    border: 1.2px solid rgba(255,255,255,0.8);
    color: white; font-family: 'Noto';
    font-size: var(--badge-size); font-weight: 700;
    padding: 8px 20px; border-radius: 3px;
    margin-bottom: 20px;
  }
  .headline {
    font-family: var(--headline-font, 'Bebas'); font-style: var(--headline-style, normal); font-size: var(--headline-size);
    color: white; line-height: var(--headline-line-height);
    letter-spacing: 2px; margin-bottom: 12px;
    word-break: keep-all;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}
  .brand-en {
    font-family: 'Noto'; font-size: var(--brand-size);
    color: white; opacity: var(--brand-opacity); letter-spacing: 1px;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }
  .tagline { rotate: var(--tagline-rotation, 0deg); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <img class="model" src="{{MODEL_PATH}}" id="model-img">
  <div class="dark-panel"></div>
  <div class="accent-line"></div>
  <div class="text-area">
    <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
    <div class="tagline" id="tagline">{{TAGLINE}}</div>
    <div class="divider"></div>
    <div class="outline-badge" id="badge">{{BADGE_TEXT}}</div>
    <div class="headline" id="headline">{{HEADLINE}}</div>
    <div class="brand-en" id="brand-en">{{BRAND_EN}}</div>
  </div>
</body>
</html>
