<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
          * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; position: relative; background: var(--panel-color); }

  /* 모델 — 우측 배치 */
  .model {
    position: absolute;
    right: 0; top: 0;
    width: var(--model-width); height: 100%;
    object-fit: cover; object-position: left center;
  }
  /* 좌측 텍스트 패널 */
  .panel {
    position: absolute; left: 0; top: 0;
    width: var(--panel-width); height: 100%;
    background: var(--panel-color);
    display: flex; flex-direction: column;
    padding: var(--panel-pad);
  }
  /* 브랜드 — 패널 상단 */
  .brand-ko {
    font-family: 'Noto'; font-size: 12px;
    color: var(--brand-color); opacity: 0.65;
    margin-bottom: 2px; display: {{BRAND_KO_DISPLAY}}
  }
  .brand-en {
    font-family: 'Bebas'; font-size: var(--brand-size);
    color: var(--brand-color); letter-spacing: 3px;
  }
  /* 구분선 */
  .divider {
    width: var(--divider-width); height: 2px;
    background: var(--accent-color);
    margin: var(--divider-margin) 0;
  }
  /* 서브헤드 */
  .subheadline {
    font-family: 'Noto'; font-size: var(--sub-size);
    color: var(--sub-color); line-height: 1.5;
    margin-bottom: 12px; display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
    margin-top: var(--sub-margin-top, 0px);
  }
  /* 헤드라인 */
  .headline {
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal); font-size: var(--headline-size);
    font-weight: 900; color: var(--headline-color);
    line-height: var(--headline-line-height);
    word-break: keep-all;
    margin-bottom: auto;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}
  /* 가격 영역 — 패널 하단 */
  .price-area {
    margin-top: auto; display: {{PRICE_DISPLAY}}
  }
  .price-label {
    font-family: 'Noto'; font-size: 14px;
    color: var(--sub-color); margin-bottom: 4px; display: block;
  }
  .price-value {
    font-family: 'Bebas'; font-size: var(--price-size);
    color: var(--accent-color); letter-spacing: 1px;
  }
  .price-unit {
    font-family: 'Noto'; font-size: calc(var(--price-size) * 0.38);
    color: var(--sub-color); margin-left: 4px; vertical-align: middle;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <img class="model" src="{{MODEL_PATH}}" id="model-img">
  <div class="panel">
    <div class="brand-ko" id="brand-ko">{{BRAND_KO}}</div>
    <div class="brand-en" id="brand-en">{{BRAND_EN}}</div>
    <div class="divider"></div>
    <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
    <div class="headline" id="headline">{{HEADLINE}}</div>
    <div class="price-area">
      <span class="price-label">{{TAGLINE}}</span>
      <span class="price-value" id="price">{{PRICE}}</span><span class="price-unit">{{PRICE_UNIT}}</span>
    </div>
  </div>
</body>
</html>
