<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
          * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; position: relative; }

  .model {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; object-position: right center;
  }
  /* 좌측 → 투명 페이드 */
  .left-fade {
    position: absolute; inset: 0;
    background: linear-gradient(to right,
      var(--fade-color) 0%,
      rgba(0,0,0,0.5) var(--fade-mid),
      transparent var(--fade-end));
  }
  /* 클리닉 브랜드 — 좌상단 */
  .brand {
    position: absolute;
    left: var(--text-left); top: var(--brand-top);
    font-family: 'Bebas'; font-size: var(--brand-size);
    color: rgba(255,255,255,0.75); letter-spacing: 2px;
  }
  /* 서브헤드 */
  .subheadline {
    position: absolute;
    left: var(--text-left); bottom: var(--sub-bottom);
    font-family: 'Noto'; font-size: var(--sub-size);
    color: rgba(255,255,255,0.7); display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
  }
  /* 메인 헤드라인 */
  .headline {
    position: absolute;
    left: var(--text-left); bottom: var(--headline-bottom);
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal); font-size: var(--headline-size);
    font-weight: 900; color: white;
    line-height: var(--headline-line-height);
    word-break: keep-all; max-width: 580px;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 580px);}
  /* 가격 */
  .price {
    position: absolute;
    left: var(--text-left); bottom: var(--price-bottom);
    font-family: 'Bebas'; font-size: var(--price-size);
    color: var(--accent-color); letter-spacing: 1px;
    display: {{PRICE_DISPLAY}}
  }
  .price-unit {
    font-family: 'Noto'; font-size: calc(var(--price-size) * 0.38);
    color: rgba(255,255,255,0.65); margin-left: 4px; vertical-align: middle;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <img class="model" src="{{MODEL_PATH}}" id="model-img">
  <div class="left-fade"></div>
  <div class="brand" id="brand-en">{{BRAND_EN}}</div>
  <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
  <div class="headline" id="headline">{{HEADLINE}}</div>
  <div class="price" id="price">{{PRICE}}<span class="price-unit">{{PRICE_UNIT}}</span></div>
</body>
</html>
