<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
          * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; position: relative; background: #f5f0eb; }

  .model {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  /* 아주 얇은 하단 페이드 */
  .gradient {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      transparent 65%,
      rgba(0,0,0,var(--gradient-opacity)) 100%);
  }
  /* 상단 액센트 라인 + 브랜드 */
  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: var(--topbar-height);
    background: var(--accent-color);
    display: flex; align-items: center;
    padding: 0 28px;
  }
  .top-brand {
    font-family: 'Bebas'; font-size: var(--brand-size);
    color: white; letter-spacing: 3px;
  }
  /* 해시태그 캡션 — 하단 */
  /* 텍스트 컨테이너 */
  .text-wrap {
    position: absolute;
    left: var(--headline-left); bottom: var(--headline-bottom);
    max-width: 680px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .headline {
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal);
    font-size: var(--headline-size); font-weight: 900; color: var(--headline-color);
    line-height: var(--headline-line-height); word-break: keep-all;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}
  .hashtags {
    font-family: 'Noto'; font-size: var(--tag-size);
    color: rgba(255,255,255,0.65);
    line-height: 1.8; display: {{SUB_DISPLAY}}
  }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <img class="model" src="{{MODEL_PATH}}" id="model-img">
  <div class="gradient"></div>
  <div class="top-bar">
    <span class="top-brand" id="brand-en">{{BRAND_EN}}</span>
  </div>
  <div class="text-wrap">
    <div class="headline" id="headline">{{HEADLINE}}</div>
    <div class="hashtags" id="subheadline">{{SUBHEADLINE}}</div>
  </div>
</body>
</html>
