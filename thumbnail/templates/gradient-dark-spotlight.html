<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    overflow: hidden; position: relative;
    background-color: var(--bg-dark);
  }

  /* 네온 야광 스팟라이트 */
  .spotlight {
    position: absolute;
    width: var(--spotlight-size);
    height: var(--spotlight-size);
    background: radial-gradient(circle at center, var(--spotlight-color) 0%, transparent 65%);
    top: var(--spotlight-y);
    left: var(--spotlight-x);
    opacity: var(--spotlight-opacity);
    mix-blend-mode: screen;
    z-index: 1;
    pointer-events: none;
  }

  /* 누끼 모델 */
  .model-cutout {
    position: absolute;
    right: var(--model-right);
    bottom: var(--model-bottom);
    width: var(--model-width);
    object-fit: contain;
    object-position: bottom center;
    z-index: 5;
    filter: drop-shadow(0 0 40px rgba(0,0,0,0.5));
  }

  /* 텍스트 컨테이너 */
  .text-container {
    position: absolute;
    top: var(--text-top);
    left: var(--text-left);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .subheadline {
    font-family: 'Noto'; font-size: var(--sub-size);
    color: var(--sub-color); display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
    margin-top: var(--sub-margin-top, 0px);
    letter-spacing: 2px;
    opacity: 0.8;
  }

  .headline {
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal);
    font-size: var(--headline-size); font-weight: 900;
    color: var(--headline-color);
    line-height: 1.15;
    word-break: keep-all;
    max-width: var(--text-max-width, 700px);
    letter-spacing: var(--headline-letter-spacing, 0px);
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}

  .price-area {
    display: {{PRICE_DISPLAY}}}};
    margin-top: 30px;
  }
  .price-value {
    font-family: 'Bebas'; font-size: var(--price-size);
    color: var(--price-color);
    text-shadow: 0 0 20px var(--spotlight-color);
  }
  .price-unit {
    font-family: 'Noto'; font-size: calc(var(--price-size) * 0.35);
    color: var(--price-color); margin-left: 6px; vertical-align: middle;
    opacity: 0.9;
  }

  /* 브랜드명 */
  .brand {
    position: absolute;
    bottom: var(--brand-bottom, 50px);
    left: var(--brand-left, 50px);
    font-family: 'Bebas'; font-size: var(--brand-size, 20px);
    color: #ffffff; letter-spacing: 5px; opacity: 0.5;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <!-- 스팟라이트 효과 -->
  <div class="spotlight"></div>

  <!-- 누끼 모델 -->
  <img class="model-cutout" src="{{MODEL_PATH}}" id="model-img">

  <!-- 텍스트 영역 -->
  <div class="text-container">
    <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
    <div class="headline" id="headline">{{HEADLINE}}</div>
    
    <div class="price-area">
      <span class="price-value" id="price">{{PRICE}}</span>
      <span class="price-unit">{{PRICE_UNIT}}</span>
    </div>
  </div>

  <div class="brand" id="brand-en">{{BRAND_EN}}</div>
</body>
</html>
