<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  @font-face { font-family: 'Bebas'; src: url('{{FONTS_DIR}}/BebasNeue-Regular.ttf'); }
  @font-face { font-family: 'Noto'; src: url('{{FONTS_DIR}}/NotoSansKR.ttf'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px; overflow: hidden; position: relative;
    background: var(--bg-color, #FF7A59);
    border: 30px dashed var(--text-color);
  }

  /* 서브 라인 장식 */
  .marquee {
    position: absolute; top: 180px; left: -50px; width: 1200px; height: 80px;
    background: var(--text-color); color: var(--bg-color);
    font-family: 'Bebas', sans-serif; font-size: 50px; font-weight: bold;
    line-height: 80px; letter-spacing: 12px;
    transform: rotate(-5deg); z-index: 2;
    overflow: hidden; white-space: nowrap; padding-left: 20px;
  }

  .model-cutout {
    position: absolute; right: 0; bottom: 0; width: 750px; height: 900px;
    object-fit: contain; object-position: bottom right; z-index: 10;
  }

  .text-layer {
    position: absolute; left: 60px; bottom: 80px; width: 900px; z-index: 20;
  }
  .brand {
    font-family: 'Noto', sans-serif; font-size: 40px; font-weight: bold;
    color: var(--text-color); opacity: 0.8; margin-bottom: 20px;
  }
  .headline {
    font-family: 'Noto', 'Bebas', sans-serif; font-size: var(--headline-size, 170px);
    font-weight: 900; color: var(--text-color); line-height: 0.95; letter-spacing: -5px;
    word-break: keep-all; text-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    -webkit-text-stroke: 4px var(--bg-color); paint-order: stroke fill;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}
  .price-area {
    margin-top: 20px; display: {{PRICE_DISPLAY}}}}; background: var(--text-color);
    display: inline-block; padding: 10px 40px 10px 20px;
    transform: skew(-10deg);
  }
  .price-value {
    font-family: 'Bebas', 'Noto', sans-serif; font-size: var(--price-size, 140px);
    font-weight: 900; color: var(--accent-color, #FFE135);
    display: inline-block; transform: skew(10deg);
  }
  .price-unit {
    font-family: 'Noto', sans-serif; font-size: 50px; color: var(--bg-color);
    font-weight: bold; margin-left:10px;
    display: inline-block; transform: skew(10deg);
  }

  /* === 에디터 커스텀 오버라이드 ===*/
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <div class="marquee">TRENDING TRENDING TRENDING TRENDING HOT HOT HOT</div>

  <img class="model-cutout" src="{{MODEL_PATH}}">

  <div class="text-layer">
    <div class="brand">{{BRAND_EN}}</div>
    <div class="headline" id="headline">{{HEADLINE}}</div>
    
    <div class="price-area">
      <span class="price-value">{{PRICE}}</span><span class="price-unit">{{PRICE_UNIT}}</span>
    </div>
  </div>
</body>
</html>
