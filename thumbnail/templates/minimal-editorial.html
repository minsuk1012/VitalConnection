<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
          * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; position: relative; }

  .model {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  .gradient {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      transparent var(--gradient-start),
      rgba(0,0,0,var(--gradient-opacity)) 100%);
  }
  .accent-line {
    position: absolute;
    left: var(--accent-left); top: var(--accent-top);
    width: var(--accent-width); height: var(--accent-height);
    background: var(--accent-color); border-radius: 2px;
  }
  .headline {
    position: absolute;
    left: var(--headline-left); bottom: var(--headline-bottom);
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal); font-size: var(--headline-size);
    font-weight: 900; color: var(--headline-color);
    line-height: var(--headline-line-height);
    word-break: keep-all; max-width: 600px;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 600px);}
  .brand {
    position: absolute;
    right: var(--brand-right); bottom: var(--brand-bottom);
    text-align: right;
  }
  .brand-ko {
    font-family: 'Noto'; font-size: 12px;
    color: rgba(255,255,255,0.65); display: {{BRAND_KO_DISPLAY}}
  }
  .brand-en {
    font-family: 'Bebas'; font-size: var(--brand-size);
    color: white; letter-spacing: 2px;
    opacity: var(--brand-opacity);
  }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <img class="model" src="{{MODEL_PATH}}" id="model-img">
  <div class="gradient"></div>
  <div class="accent-line"></div>
  <div class="headline" id="headline">{{HEADLINE}}</div>
  <div class="brand">
    <div class="brand-ko" id="brand-ko">{{BRAND_KO}}</div>
    <div class="brand-en" id="brand-en">{{BRAND_EN}}</div>
  </div>
</body>
</html>
