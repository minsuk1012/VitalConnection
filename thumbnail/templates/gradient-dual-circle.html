<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
          * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px; overflow: hidden; position: relative;
    background: linear-gradient(var(--bg-angle), var(--bg-start) 0%, var(--bg-mid) 50%, var(--bg-end) 100%);
  }

  /* ── 장식 요소 ── */

  /* 호(arc) 선 — 좌측 중단 */
  .deco-arc {
    position: absolute;
    left: var(--arc-x); top: var(--arc-y);
    width: var(--arc-size); height: var(--arc-size);
    opacity: var(--deco-opacity);
  }

  /* 별 아웃라인 — 좌하단 */
  .deco-star {
    position: absolute;
    left: var(--star-x); bottom: var(--star-y);
    width: var(--star-size); height: var(--star-size);
    opacity: var(--deco-opacity);
  }

  /* 스파클 아이콘 — 브랜드명 옆 */
  .sparkle {
    position: absolute;
    left: var(--sparkle-x); top: var(--sparkle-y);
    font-size: var(--sparkle-size);
    color: var(--text-color); opacity: 0.9;
  }

  /* ── 텍스트 영역 ── */
  .brand {
    position: absolute;
    left: var(--text-left); top: var(--brand-top);
    font-family: 'Noto'; font-size: var(--brand-size);
    font-weight: 900; color: var(--text-color);
    line-height: 1.05; word-break: keep-all;
    max-width: var(--text-max-width);
  }

  /* 가로 구분선 */
  .divider-h {
    position: absolute;
    left: var(--text-left); top: var(--divider-top);
    width: var(--divider-width); height: 3px;
    background: var(--text-color); border-radius: 2px;
    opacity: 0.7;
  }

  /* 시술명 */
  .headline {
    position: absolute;
    left: var(--text-left); top: var(--headline-top);
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal); font-size: var(--headline-size);
    font-weight: 900; color: var(--text-color);
    line-height: 1.2; word-break: keep-all;
    max-width: var(--text-max-width);
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}

  /* ── 원형 이미지 ── */

  /* 메인 원 (대) */
  .circle-main {
    position: absolute;
    right: var(--main-right); top: var(--main-top);
    width: var(--main-size); height: var(--main-size);
    border-radius: 50%; overflow: hidden;
    border: var(--circle-border) solid var(--circle-border-color);
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .circle-main img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: var(--main-crop-x) var(--main-crop-y);
  }

  /* 서브 원 (소) — 메인 오른쪽 하단에 겹침 */
  .circle-sub {
    position: absolute;
    right: var(--sub-right); bottom: var(--sub-bottom);
    width: var(--sub-size); height: var(--sub-size);
    border-radius: 50%; overflow: hidden;
    border: var(--circle-border) solid var(--circle-border-color);
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .circle-sub img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: var(--sub-crop-x) var(--sub-crop-y);
  }

  /* === 에디터 커스텀 오버라이드 ===*/
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>

  <!-- 호(arc) 장식 -->
  <svg class="deco-arc" viewBox="0 0 200 200" fill="none">
    <circle cx="100" cy="100" r="90" stroke="var(--text-color)" stroke-width="2.5" stroke-opacity="0.35"/>
  </svg>

  <!-- 별 장식 -->
  <svg class="deco-star" viewBox="0 0 100 100" fill="none">
    <line x1="50" y1="2"  x2="50" y2="98" stroke="var(--text-color)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2"  y1="50" x2="98" y2="50" stroke="var(--text-color)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15" y1="15" x2="85" y2="85" stroke="var(--text-color)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="85" y1="15" x2="15" y2="85" stroke="var(--text-color)" stroke-width="2.5" stroke-linecap="round"/>
  </svg>

  <!-- 스파클 -->
  <div class="sparkle">✦</div>

  <!-- 텍스트 -->
  <div class="brand" id="brand-en">{{BRAND_EN}}</div>
  <div class="divider-h"></div>
  <div class="headline" id="headline">{{HEADLINE}}</div>

  <!-- 메인 원형 모델 -->
  <div class="circle-main">
    <img src="{{MODEL_PATH}}" id="model-img">
  </div>

  <!-- 서브 원형 모델 (클로즈업) -->
  <div class="circle-sub">
    <img src="{{MODEL_PATH}}">
  </div>

</body>
</html>
