<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
          * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; position: relative; }

  .model {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    object-position: right center;
  }
  /* 단색 그라디언트 — 좌→우 */
  .color-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to right,
      var(--overlay-color),
      transparent var(--overlay-width));
    opacity: var(--overlay-opacity);
  }
  /* 브랜드 — 좌상단 */
  .brand-area {
    position: absolute;
    left: var(--text-left); top: var(--brand-top);
  }
  .brand-ko {
    font-family: 'Noto'; font-size: 13px;
    color: rgba(255,255,255,0.7); margin-bottom: 2px;
    display: {{BRAND_KO_DISPLAY}}
  }
  .brand-en {
    font-family: 'Bebas'; font-size: var(--brand-size);
    color: white; letter-spacing: 3px;
  }
  /* 헤드라인 + 서브 컨테이너 */
  .text-wrap {
    position: absolute;
    left: var(--text-left); top: var(--headline-top);
    max-width: 520px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .headline {
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal);
    font-size: var(--headline-size); font-weight: 900; color: white;
    line-height: var(--headline-line-height); word-break: keep-all;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}
  /* 서브헤드 */
  .subheadline {
    font-family: 'Noto'; font-size: var(--sub-size);
    color: rgba(255,255,255,0.8);
    line-height: 1.5; display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
    margin-top: var(--sub-margin-top, 0px);
  }
  /* 가격 */
  .price-area {
    position: absolute;
    left: var(--text-left); top: var(--price-top);
    display: {{PRICE_DISPLAY}}
  }
  .price-label {
    font-family: 'Noto'; font-size: var(--sub-size);
    color: rgba(255,255,255,0.6); display: block; margin-bottom: 2px;
  }
  .price-value {
    font-family: 'Bebas'; font-size: var(--price-size);
    color: var(--accent-color); letter-spacing: 1px;
  }
  .price-unit {
    font-family: 'Noto'; font-size: calc(var(--price-size) * 0.38);
    color: rgba(255,255,255,0.65); margin-left: 4px; vertical-align: middle;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <img class="model" src="{{MODEL_PATH}}" id="model-img">
  <div class="color-overlay"></div>
  <div class="brand-area">
    <div class="brand-ko" id="brand-ko">{{BRAND_KO}}</div>
    <div class="brand-en" id="brand-en">{{BRAND_EN}}</div>
  </div>
  <div class="text-wrap">
    <div class="headline" id="headline">{{HEADLINE}}</div>
    <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
  </div>
  <div class="price-area">
    <span class="price-label">{{TAGLINE}}</span>
    <span class="price-value" id="price">{{PRICE}}</span><span class="price-unit">{{PRICE_UNIT}}</span>
  </div>
</body>
</html>
