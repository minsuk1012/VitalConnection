<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    overflow: hidden; position: relative;
    background-color: var(--bg-color, #FAFAFA);
  }

  /* 그라디언트 테두리 액자 */
  .border-frame {
    position: absolute;
    top: var(--frame-margin); bottom: var(--frame-margin);
    left: var(--frame-margin); right: var(--frame-margin);
    border: var(--frame-width) solid transparent;
    border-image: var(--gradient-line) 1;
    z-index: 10;
    pointer-events: none;
  }

  /* 누끼 모델 */
  .model-wrapper {
    position: absolute;
    right: var(--model-right);
    bottom: var(--model-bottom);
    width: var(--model-width);
    height: 100%;
    z-index: 5;
    display: flex; align-items: flex-end; justify-content: flex-end;
  }
  .model-cutout {
    width: 100%; object-fit: contain; object-position: bottom center;
  }

  /* 텍스트 레이어 */
  .text-layer {
    position: absolute;
    top: var(--text-top);
    left: var(--text-left);
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background-color: var(--text-bg-color, transparent);
    padding: var(--text-padding, 0px);
  }

  .subheadline {
    font-family: 'Noto'; font-size: var(--sub-size);
    color: var(--sub-color); display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
    margin-top: var(--sub-margin-top, 0px);
    letter-spacing: 1px; font-weight: 500;
  }

  .headline {
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal);
    font-size: var(--headline-size); font-weight: 900;
    line-height: 1.15;
    word-break: keep-all;
    max-width: var(--text-max-width, 700px);
    letter-spacing: var(--headline-letter-spacing, 0px);
    
    /* 텍스트 그라디언트 핵심 */
    background: var(--text-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}

  .price-area {
    display: {{PRICE_DISPLAY}}}};
    margin-top: 20px;
  }
  .price-value {
    font-family: 'Bebas'; font-size: var(--price-size);
    /* 텍스트 그라디언트 적용 여부에 따라 분리 가능, 일단 단색 추천 */
    color: var(--price-color);
  }
  .price-unit {
    font-family: 'Noto'; font-size: calc(var(--price-size) * 0.35);
    color: var(--price-color); margin-left: 4px; vertical-align: middle;
  }

  /* 브랜드 */
  .brand {
    position: absolute;
    top: calc(var(--frame-margin) + 20px);
    right: calc(var(--frame-margin) + 20px);
    font-family: 'Bebas'; font-size: var(--brand-size, 20px);
    color: var(--brand-color); letter-spacing: 3px; z-index: 20;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <!-- 그라디언트 프레임 -->
  <div class="border-frame"></div>

  <!-- 누끼 모델 -->
  <div class="model-wrapper">
    <img class="model-cutout" src="{{MODEL_PATH}}" id="model-img">
  </div>

  <div class="text-layer">
    <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
    <div class="headline" id="headline">{{HEADLINE}}</div>
    <div class="price-area">
      <span class="price-value" id="price">{{PRICE}}</span><span class="price-unit">{{PRICE_UNIT}}</span>
    </div>
  </div>

  <div class="brand" id="brand-en">{{BRAND_EN}}</div>
</body>
</html>
