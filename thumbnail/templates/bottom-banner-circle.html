<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
          * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px; overflow: hidden; position: relative;
    background: var(--bg-color);
    display: flex; flex-direction: column; align-items: center;
  }

  /* 원형 모델 */
  .circle-wrap {
    position: absolute;
    top: var(--circle-top);
    left: 50%; transform: translateX(-50%);
    width: var(--circle-size); height: var(--circle-size);
    border-radius: 50%; overflow: hidden;
    border: var(--circle-border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }
  .model {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
  }
  /* 서브 태그 — 원 위 */
  .tag {
    position: absolute;
    top: var(--tag-top); left: 50%; transform: translateX(-50%);
    font-family: 'Noto'; font-size: var(--tag-size);
    color: var(--tag-text-color);
    background: var(--tag-bg); padding: 6px 16px; border-radius: 20px;
    white-space: nowrap;
    display: {{TAGLINE_DISPLAY}}
  }
  /* 하단 배너 */
  .banner {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: var(--banner-height);
    background: var(--banner-color);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
  }
  .headline {
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal); font-size: var(--headline-size);
    font-weight: 900; color: var(--text-color);
    text-align: center; word-break: keep-all;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}
  .price-row {
    display: flex; align-items: baseline; gap: 6px;
    display: {{PRICE_DISPLAY}}
  }
  .price-value {
    font-family: 'Bebas'; font-size: var(--price-size);
    color: var(--accent-color); letter-spacing: 1px;
  }
  .price-unit {
    font-family: 'Noto'; font-size: calc(var(--price-size) * 0.38);
    color: var(--text-color); opacity: 0.7;
  }
  .brand {
    position: absolute; right: 20px; bottom: 16px;
    font-family: 'Bebas'; font-size: var(--brand-size);
    color: var(--text-color); opacity: 0.5; letter-spacing: 2px;
  }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { line-height: var(--headline-line-height, 1.2); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <div class="tag" id="tagline">{{TAGLINE}}</div>
  <div class="circle-wrap">
    <img class="model" src="{{MODEL_PATH}}" id="model-img">
  </div>
  <div class="banner">
    <div class="headline" id="headline">{{HEADLINE}}</div>
    <div class="price-row">
      <span class="price-value" id="price">{{PRICE}}</span>
      <span class="price-unit">{{PRICE_UNIT}}</span>
    </div>
  </div>
  <div class="brand" id="brand-en">{{BRAND_EN}}</div>
</body>
</html>
