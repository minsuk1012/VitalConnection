<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  @font-face { font-family: 'Bebas'; src: url('{{FONTS_DIR}}/BebasNeue-Regular.ttf'); }
  @font-face { font-family: 'Noto'; src: url('{{FONTS_DIR}}/NotoSansKR.ttf'); }
  @font-face { font-family: 'NotoSerif'; src: url('{{FONTS_DIR}}/NotoSerif-Regular.ttf'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px; overflow: hidden; position: relative;
    background: var(--bg-color, #ffffff);
  }

  /* 모델 배경 */
  .model {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover; object-position: center bottom;
    z-index: 1;
  }

  /* 골드(그라디언트) 통합 액자 (clip-path evenodd 방식) */
  .gold-frame {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    
    /* 베이스 색상 (사용자가 선택한 RGB 컬러) */
    background-color: var(--frame-base-color, #D4AF37);
    
    /* 그라디언트 텍스처 오버레이 (마치 메탈인 것처럼) */
    background-image: linear-gradient(135deg, 
      rgba(255, 255, 255, 0.7) 0%, 
      rgba(255, 255, 255, 0.1) 25%, 
      rgba(0, 0, 0, 0.15) 50%, 
      rgba(255, 255, 255, 0.5) 75%, 
      rgba(0, 0, 0, 0.4) 100%
    );
    z-index: 5; pointer-events: none;
    /* 전체 화면을 채우고, 가운데(테두리 35px 제외)를 뚫어 하나의 통 프레임 생성 */
    clip-path: polygon(evenodd, 
      0 0, 100% 0, 100% 100%, 0 100%, 0 0, 
      35px 35px, calc(100% - 35px) 35px, calc(100% - 35px) calc(100% - 35px), 35px calc(100% - 35px), 35px 35px
    );
  }
  
  /* 작은 띠 장식 (우측 장식선) */
  .right-deco-line {
    position: absolute; right: 15px; bottom: 350px;
    width: 15px; height: 150px; background: rgba(0,0,0,0.4);
    z-index: 6; display: {{TAGLINE_DISPLAY}}
  }

  /* 좌측 두꺼운 세로 패널 */
  .left-panel {
    position: absolute; top: 0; left: 0;
    width: 260px; height: 100%;
    background: var(--panel-color, #F5F0E6);
    z-index: 10;
    padding: 50px 30px;
    display: flex; flex-direction: column;
    box-shadow: 20px 0 30px rgba(0,0,0,0.05); /* 프레임과 자연스러운 분리감 */
  }

  /* 좌측 상단 브랜드와 태그 */
  .brand-en {
    font-family: 'Bebas', 'Noto', sans-serif;
    font-size: 45px; line-height: 1.1; font-weight: 900;
    color: var(--text-color, #111); letter-spacing: 2px;
    margin-bottom: 50px; word-break: break-all;
  }
  .subheadline {
    font-family: 'Noto', sans-serif; font-size: 38px;
    color: var(--text-color, #111); font-weight: 900;
    margin-bottom: 20px; display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
    margin-top: var(--sub-margin-top, 0px);
  }

  /* 세로로 정렬되는 거대 헤드라인 */
  .headline {
    font-family: 'Noto', 'Bebas', sans-serif; 
    font-size: var(--headline-size, 160px);
    font-weight: 900; color: var(--accent-color, #C29367);
    line-height: 1.1; 
    /* 한국어 세로쓰기 */
    writing-mode: vertical-rl;
    text-orientation: upright;
    letter-spacing: -5px; word-break: break-all;
    display: flex; height: 100%;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}

  /* 우측 하단 네모난 가격 박스 */
  .price-box {
    position: absolute; right: 50px; bottom: 50px;
    background: var(--panel-color, #F5F0E6);
    border: 8px solid var(--text-color, #111); /* 두꺼운 테두리 */
    padding: 15px 40px; z-index: 20;
    display: {{PRICE_DISPLAY}}
  }
  .price-value {
    font-family: 'Bebas', 'Noto', sans-serif; font-size: var(--price-size, 120px);
    font-weight: 900; color: var(--text-color, #111);
    letter-spacing: -3px;
  }
  .price-unit {
    font-family: 'Noto', sans-serif; font-size: 70px;
    font-weight: 900; color: var(--text-color, #111);
    margin-left: 5px;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <!-- 액자 (통합 프레임) -->
  <div class="gold-frame"></div>
  <div class="right-deco-line"></div>

  <!-- 누끼 및 풀 사진 모두 호환 -->
  <img class="model" src="{{MODEL_PATH}}">

  <!-- 좌측 세로 패널 (라라필 텍스트) -->
  <div class="left-panel">
    <div class="brand-en">{{BRAND_EN}}</div>
    <div class="subheadline">{{SUBHEADLINE}}</div>
    <div class="headline" id="headline">{{HEADLINE}}</div>
  </div>

  <!-- 하단 가격 박스 -->
  <div class="price-box">
    <span class="price-value" id="price">{{PRICE}}</span><span class="price-unit">{{PRICE_UNIT}}</span>
  </div>
</body>
</html>
