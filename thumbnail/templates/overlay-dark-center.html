<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; position: relative; }

  .model {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: var(--model-x) var(--model-y);
    filter: brightness(var(--model-brightness));
  }
  /* 전체 어두운 오버레이 */
  .dark-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,var(--overlay-opacity));
  }
  /* 스파클 장식 */
  .sparkle {
    position: absolute;
    font-size: var(--sparkle-size);
    color: var(--sparkle-color);
    display: var(--sparkle-display);
  }
  .sp1 { left: var(--sp1-x); top: var(--sp1-y); }
  .sp2 { right: var(--sp2-x); top: var(--sp2-y); }
  .sp3 { left: var(--sp3-x); bottom: var(--sp3-y); }
  .sp4 { right: var(--sp4-x); bottom: var(--sp4-y); }

  /* 텍스트 영역 — 중앙 */
  .text-area {
    position: absolute;
    left: var(--text-left);
    top: var(--text-top);
    width: var(--text-width);
    display: flex;
    flex-direction: column;
    gap: var(--text-gap, 14px);
  }
  .headline {
    font-family: var(--headline-font, 'Noto');
    font-size: var(--headline-size);
    font-weight: 900;
    font-style: var(--headline-style, normal);
    color: var(--headline-color);
    line-height: var(--headline-line-height);
    letter-spacing: var(--headline-letter-spacing);
    word-break: keep-all;
    text-align: var(--text-align);
    margin-bottom: 0;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}
  /* 해시태그 */
  .hashtags {
    font-family: var(--headline-font, 'Noto');
    font-size: var(--sub-size);
    color: var(--headline-color);
    opacity: 0.8;
    line-height: 1.8;
    text-align: var(--text-align);
    display: {{SUB_DISPLAY}}
  }
  /* 브랜드 */
  .brand {
    position: absolute;
    right: var(--brand-right);
    bottom: var(--brand-bottom);
    font-family: 'Bebas';
    font-size: var(--brand-size);
    color: white;
    opacity: var(--brand-opacity);
    letter-spacing: 2px;
  }

  /* 원형 가격 배지 */
  .price-badge {
    position: absolute;
    right: var(--badge-right);
    bottom: var(--badge-bottom);
    width: var(--badge-size);
    height: var(--badge-size);
    border-radius: 50%;
    background: var(--badge-color);
    display: {{BADGE_DISPLAY}};
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .badge-value {
    font-family: 'Bebas';
    font-size: calc(var(--badge-size) * 0.3);
    color: white;
    letter-spacing: 1px;
    line-height: 1;
  }
  .badge-unit {
    font-family: 'Noto';
    font-size: calc(var(--badge-size) * 0.14);
    color: white;
    margin-top: 2px;
  }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <img class="model" src="{{MODEL_PATH}}" id="model-img">
  <div class="dark-overlay"></div>

  <span class="sparkle sp1">✦</span>
  <span class="sparkle sp2">✦</span>
  <span class="sparkle sp3">✧</span>
  <span class="sparkle sp4">✦</span>

  <div class="text-area">
    <div class="headline" id="headline">{{HEADLINE}}</div>
    <div class="hashtags" id="subheadline">{{SUBHEADLINE}}</div>
  </div>

  <div class="brand" id="brand-en">{{BRAND_EN}}</div>
  <div class="price-badge">
    <span class="badge-value" id="price">{{PRICE}}</span>
    <span class="badge-unit">{{PRICE_UNIT}}</span>
  </div>
</body>
</html>
