<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
          * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; position: relative; background: #111; }

  .model {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(var(--model-brightness));
  }
  /* 하단 강한 그라디언트 */
  .gradient {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      transparent var(--gradient-start),
      rgba(0,0,0,var(--gradient-opacity)) 100%);
  }
  /* 클리닉 로고 — 좌상단 */
  .logo {
    position: absolute;
    left: var(--logo-left); top: var(--logo-top);
    font-family: 'Bebas'; font-size: var(--logo-size);
    color: white; letter-spacing: 2px; opacity: 0.85;
    display: {{BRAND_KO_DISPLAY}}
  }
  /* 서브헤드 — 헤드라인 위 */
  .subheadline {
    position: absolute;
    left: var(--sub-left); bottom: var(--sub-bottom);
    font-family: 'Noto'; font-size: var(--sub-size);
    color: rgba(255,255,255,0.75); display: {{SUB_DISPLAY}}
  }
  /* 메인 헤드라인 */
  .headline {
    position: absolute;
    left: var(--headline-left); bottom: var(--headline-bottom);
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal); font-size: var(--headline-size);
    font-weight: 900; color: white;
    line-height: var(--headline-line-height);
    word-break: keep-all; max-width: 700px;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 700px);}
  /* 가격 — 헤드라인 아래 */
  .price {
    position: absolute;
    left: var(--price-left); bottom: var(--price-bottom);
    font-family: 'Bebas'; font-size: var(--price-size);
    color: var(--accent-color); letter-spacing: 1px;
    display: {{PRICE_DISPLAY}}
  }
  .price-unit {
    font-family: 'Noto'; font-size: calc(var(--price-size) * 0.4);
    color: rgba(255,255,255,0.7); margin-left: 4px;
    vertical-align: middle;
  }
  /* 클리닉명 우하단 */
  .brand {
    position: absolute;
    right: var(--brand-right); bottom: var(--brand-bottom);
    font-family: 'Bebas'; font-size: var(--brand-size);
    color: rgba(255,255,255,0.6); letter-spacing: 2px;
    text-align: right;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); opacity: var(--headline-opacity, 1); rotate: var(--headline-rotation, 0deg); }
</style>
</head>
<body>
  <img class="model" src="{{MODEL_PATH}}" id="model-img">
  <div class="gradient"></div>
  <div class="logo" id="brand-ko">{{BRAND_KO}}</div>
  <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
  <div class="headline" id="headline">{{HEADLINE}}</div>
  <div class="price" id="price">{{PRICE}}<span class="price-unit">{{PRICE_UNIT}}</span></div>
  <div class="brand" id="brand-en">{{BRAND_EN}}</div>
</body>
</html>
