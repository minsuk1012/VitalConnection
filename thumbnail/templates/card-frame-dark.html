<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
              * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px;
    overflow: hidden; position: relative;
    background: var(--bg-color);
  }

  /* 배경 조도 — 우상단 밝기, 좌하단 어둠 */
  body::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 75% 15%, rgba(255,255,255,0.05) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 10% 90%, rgba(0,0,0,0.35) 0%, transparent 60%);
    z-index: 0; pointer-events: none;
  }

  /* ── 카드 — 기울어짐 + 3겹 부유 효과 ── */

  /* 1. 컬러 오프셋 블록 (accent 컬러 고형 그림자) */
  .card-block {
    position: absolute;
    left: var(--card-left); top: var(--card-top);
    width: var(--card-width); height: var(--card-height);
    background: var(--accent-color);
    transform: rotate(-2.5deg) translate(16px, 16px);
    transform-origin: center center;
    z-index: 2;
    opacity: 0.75;
  }

  /* 2. 소프트 드롭 섀도우 */
  .card-blur {
    position: absolute;
    left: var(--card-left); top: var(--card-top);
    width: var(--card-width); height: var(--card-height);
    background: rgba(0,0,0,0.55);
    transform: rotate(-2.5deg) translate(0, 28px);
    transform-origin: center center;
    filter: blur(28px);
    z-index: 3;
  }

  /* 3. 카드 본체 */
  .card {
    position: absolute;
    left: var(--card-left); top: var(--card-top);
    width: var(--card-width); height: var(--card-height);
    overflow: hidden;
    transform: rotate(-2.5deg);
    transform-origin: center center;
    z-index: 4;
  }
  .model {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
    display: block;
  }
  /* 카드 하단 페이드 — 헤드라인 가독성 */
  .card::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(
      to top,
      rgba(0,0,0,0.70) 0%,
      rgba(0,0,0,0.30) 30%,
      transparent 60%
    );
  }

  /* ── 브랜드 — 우상단 ── */
  .brand {
    position: absolute;
    top: 50px; right: 60px;
    z-index: 10;
    text-align: right;
  }
  .brand-en {
    font-family: 'Bebas';
    font-size: var(--brand-size);
    color: var(--accent-color);
    letter-spacing: 6px;
    line-height: 1;
  }
  .brand-ko {
    font-family: 'Noto';
    font-size: 13px;
    color: var(--text-color);
    opacity: 0.38;
    letter-spacing: 3px;
    margin-top: 6px;
    display: {{BRAND_KO_DISPLAY}}
  }

  /* ── 헤드라인 블록 — 카드 위로 겹침 ── */
  .text-block {
    position: absolute;
    left: var(--text-left);
    top: var(--text-top);
    width: var(--text-width);
    z-index: 20;
  }
  .subheadline {
    font-family: 'NotoSerif', serif;
    font-size: var(--sub-size);
    color: var(--text-color);
    opacity: 0.85;
    font-style: italic;
    letter-spacing: 1px;
    margin-bottom: 14px;
    display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
    margin-top: var(--sub-margin-top, 0px);
  }
  .headline {
    font-family: 'Bebas', 'Noto', sans-serif;
    font-weight: 800;
    font-size: var(--headline-size);
    color: var(--text-color);
    line-height: 0.95;
    letter-spacing: 1px;
    word-break: keep-all;
    /* 카드 사진 위 가독성 */
    text-shadow: 0 4px 12px rgba(0,0,0,0.7), 0 8px 30px rgba(0,0,0,0.6);
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}

  /* ── 가격 — 우하단 ── */
  .price-area {
    position: absolute;
    right: 60px; bottom: 68px;
    z-index: 20;
    text-align: right;
    display: {{PRICE_DISPLAY}}
  }
  .price-value {
    font-family: 'Bebas', 'Noto', sans-serif;
    font-weight: bold;
    font-size: var(--price-size);
    color: var(--accent-color);
    line-height: 1;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }
  .price-unit {
    font-family: 'Noto';
    font-weight: bold;
    font-size: 18px;
    color: var(--text-color);
    opacity: 0.6;
    letter-spacing: 1px;
    margin-left: 5px;
  }

  /* ── 태그라인 배지 — 좌하단 ── */
  .tagline {
    position: absolute;
    left: 60px; bottom: 80px;
    z-index: 20;
    font-family: 'Noto'; font-size: 14px;
    color: var(--bg-color);
    background: var(--accent-color);
    padding: 7px 18px;
    letter-spacing: 1px;
    display: {{TAGLINE_DISPLAY}}}};
    rotate: var(--tagline-rotation, 0deg);
    bottom: var(--tagline-bottom, 80px);
    left: var(--tagline-left, 60px);
  }

  /* ── 장식 수평선 (우상단 브랜드 하단) ── */
  .deco-rule {
    position: absolute;
    right: 60px; top: 120px;
    width: 160px; height: 1px;
    background: linear-gradient(to left, var(--accent-color), transparent);
    opacity: 0.4;
    z-index: 5;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }
  .tagline { rotate: var(--tagline-rotation, 0deg); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <div class="card-block"></div>
  <div class="card-blur"></div>
  <div class="card">
    <img class="model" src="{{MODEL_PATH}}" id="model-img">
  </div>

  <div class="brand">
    <div class="brand-en" id="brand-en">{{BRAND_EN}}</div>
    <div class="brand-ko" id="brand-ko">{{BRAND_KO}}</div>
  </div>
  <div class="deco-rule"></div>

  <div class="text-block">
    <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
    <div class="headline" id="headline">{{HEADLINE}}</div>
  </div>

  <div class="price-area">
    <span class="price-value" id="price">{{PRICE}}</span>
    <span class="price-unit">{{PRICE_UNIT}}</span>
  </div>

  <div class="tagline" id="tagline">{{TAGLINE}}</div>
</body>
</html>
