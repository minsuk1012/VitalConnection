<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
          * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; position: relative; background: #f5f0eb; }

  .model {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; object-position: right center;
  }
  .panel {
    position: absolute; left: 0; top: 0;
    width: var(--panel-width); height: 100%;
    background: var(--panel-color);
  }
  .brand {
    position: absolute; top: var(--brand-top); left: 50%;
    transform: translateX(-50%); text-align: center;
  }
  .brand-ko {
    font-family: 'Noto'; font-size: 13px; color: #888;
    letter-spacing: 1px; display: {{BRAND_KO_DISPLAY}}
  }
  .brand-en {
    font-family: 'Bebas'; font-size: var(--brand-size);
    color: var(--brand-color); letter-spacing: 3px;
  }
  .subheadline {
    position: absolute;
    left: var(--sub-left); bottom: var(--sub-bottom);
    font-family: 'Noto'; font-size: var(--sub-size);
    color: var(--sub-color); display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
  }
  .headline {
    position: absolute;
    left: var(--headline-left); bottom: var(--headline-bottom);
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal); font-size: var(--headline-size);
    font-weight: 900; color: var(--headline-color);
    line-height: var(--headline-line-height);
    word-break: keep-all; max-width: 480px;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 480px);}
  .accent-bar {
    position: absolute;
    left: var(--accent-left); bottom: var(--accent-bottom);
    width: var(--accent-width); height: var(--accent-height);
    background: var(--accent-color); border-radius: 3px;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <img class="model" src="{{MODEL_PATH}}" id="model-img">
  <div class="panel"></div>
  <div class="brand">
    <div class="brand-ko" id="brand-ko">{{BRAND_KO}}</div>
    <div class="brand-en" id="brand-en">{{BRAND_EN}}</div>
  </div>
  <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
  <div class="headline" id="headline">{{HEADLINE}}</div>
  <div class="accent-bar"></div>
</body>
</html>
