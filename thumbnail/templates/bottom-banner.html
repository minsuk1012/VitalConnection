<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
          * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; position: relative; background: #eee; }
  /* 외곽 테두리 프레임 (0px = 테두리 없음) */
  .frame-border {
    position: absolute; inset: 0; z-index: 10; pointer-events: none;
    border: var(--frame-width) solid var(--frame-color);
  }

  .model {
    position: absolute; inset: 0;
    width: 100%; height: var(--model-height);
    object-fit: cover; object-position: center top;
  }
  /* 하단 배너 */
  .banner {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: var(--banner-height);
    background: var(--banner-color);
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 0 var(--banner-pad);
  }
  .subheadline {
    font-family: 'Noto'; font-size: var(--sub-size);
    color: var(--text-color); opacity: 0.8; margin-bottom: 4px;
    display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
    margin-top: var(--sub-margin-top, 0px);
  }
  .headline {
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal); font-size: var(--headline-size);
    font-weight: 900; color: var(--text-color);
    line-height: 1.15; word-break: keep-all;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}
  .price-row {
    display: flex; align-items: baseline; gap: 8px; margin-top: 8px;
    display: {{PRICE_DISPLAY}}
  }
  .price-value {
    font-family: 'Bebas'; font-size: var(--price-size);
    color: var(--accent-color); letter-spacing: 1px;
  }
  .price-unit {
    font-family: 'Noto'; font-size: calc(var(--price-size) * 0.4);
    color: var(--text-color); opacity: 0.7;
  }
  /* 브랜드 — 배너 우측 */
  .brand {
    position: absolute;
    right: var(--banner-pad); bottom: calc(var(--banner-height) / 2 - 10px);
    font-family: 'Bebas'; font-size: var(--brand-size);
    color: var(--text-color); opacity: 0.6; letter-spacing: 2px;
  }
  /* 상단 로고 */
  .top-logo {
    position: absolute; top: 20px; left: 24px;
    font-family: 'Bebas'; font-size: var(--logo-size);
    color: white; letter-spacing: 2px; opacity: 0.85;
    display: {{BRAND_KO_DISPLAY}}
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <img class="model" src="{{MODEL_PATH}}" id="model-img">
  <div class="top-logo" id="brand-ko">{{BRAND_KO}}</div>
  <div class="banner">
    <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
    <div class="headline" id="headline">{{HEADLINE}}</div>
    <div class="price-row">
      <span class="price-value" id="price">{{PRICE}}</span>
      <span class="price-unit">{{PRICE_UNIT}}</span>
    </div>
  </div>
  <div class="brand" id="brand-en">{{BRAND_EN}}</div>
  <div class="frame-border"></div>
</body>
</html>
