<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    overflow: hidden; position: relative;
    background: var(--bg-gradient);
  }

  /* 일반 해상도 배경 모델도 지원 가능하나 누끼를 추천 */
  .model-cutout {
    position: absolute;
    right: var(--model-right);
    bottom: var(--model-bottom);
    width: var(--model-width);
    object-fit: contain;
    object-position: bottom center;
    z-index: 1;
  }

  /* 글래스모피즘 카드 */
  .glass-card {
    position: absolute;
    top: var(--card-y);
    left: var(--card-x);
    width: var(--card-width);
    padding: var(--card-padding);
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border: var(--glass-border-width) solid var(--glass-border-color);
    border-radius: var(--glass-radius);
    box-shadow: var(--glass-shadow);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: var(--text-gap, 16px);
  }

  .subheadline {
    font-family: 'Noto'; font-size: var(--sub-size);
    color: var(--sub-color); display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
    margin-top: var(--sub-margin-top, 0px);
  }

  .headline {
    font-family: var(--headline-font, 'Noto'); font-style: var(--headline-style, normal);
    font-size: var(--headline-size); font-weight: 900; 
    color: var(--headline-color);
    line-height: var(--headline-line-height);
    word-break: keep-all;
    max-width: 100%;
    letter-spacing: var(--headline-letter-spacing, 0px);
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 100%);}

  .price-area {
    display: {{PRICE_DISPLAY}}}};
    margin-top: var(--price-mt, 20px);
    border-top: 1px solid var(--glass-divider, rgba(255,255,255,0.2));
    padding-top: var(--price-mt, 20px);
  }
  .price-value {
    font-family: 'Bebas'; font-size: var(--price-size);
    color: var(--price-color);
  }
  .price-unit {
    font-family: 'Noto'; font-size: calc(var(--price-size) * 0.35);
    color: var(--price-color); margin-left: 6px; vertical-align: middle;
  }

  /* 브랜드명 */
  .brand {
    position: absolute;
    top: var(--brand-top, 60px);
    right: var(--brand-right, 60px);
    font-family: 'Bebas'; font-size: var(--brand-size);
    color: var(--brand-color); letter-spacing: 2px;
    z-index: 20;
    opacity: 0.8;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <!-- 배경/모델 -->
  <img class="model-cutout" src="{{MODEL_PATH}}" id="model-img">

  <!-- 브랜드 -->
  <div class="brand" id="brand-en">{{BRAND_EN}}</div>

  <!-- 글래스모피즘 텍스트 카드 -->
  <div class="glass-card">
    <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
    <div class="headline" id="headline">{{HEADLINE}}</div>
    
    <div class="price-area">
      <span class="price-value" id="price">{{PRICE}}</span>
      <span class="price-unit">{{PRICE_UNIT}}</span>
    </div>
  </div>
</body>
</html>
