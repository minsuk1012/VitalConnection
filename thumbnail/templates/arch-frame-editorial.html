<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  @font-face { font-family: 'Bebas'; src: url('{{FONTS_DIR}}/BebasNeue-Regular.ttf'); }
  @font-face { font-family: 'Noto'; src: url('{{FONTS_DIR}}/NotoSansKR.ttf'); }
  @font-face { font-family: 'NotoSerif'; src: url('{{FONTS_DIR}}/NotoSerif-Regular.ttf'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px;
    overflow: hidden; position: relative;
    background: var(--bg-color); /* 예: 오렌지톤/피치톤 */
    color: var(--text-color);
  }

  /* 배경 에디토리얼 선 (Architectural Lines) */
  .grid-lines {
    position: absolute; inset: 0; z-index: 1; pointer-events: none;
  }
  .grid-lines::before { /* 수평 중앙 분할선 */
    content: ''; position: absolute;
    top: 108px; left: 0; width: 100%; height: 1px; background: rgba(0,0,0,0.15);
  }
  .grid-lines::after { /* 수평 하단 분할선 */
    content: ''; position: absolute;
    bottom: 108px; left: 0; width: 100%; height: 1px; background: rgba(0,0,0,0.15);
  }
  .vertical-line-left, .vertical-line-right {
    position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(0,0,0,0.15);
    z-index: 1;
  }
  .vertical-line-left { left: 240px; }
  .vertical-line-right { right: 240px; }

  /* 아치형 프레임 마스크 */
  .arch-frame {
    position: absolute;
    top: 140px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 800px;
    /* 윗부분 둥근 아치, 아랫부분 직각 */
    border-radius: 300px 300px 0 0;
    overflow: hidden;
    z-index: 10;
    background: rgba(255, 255, 255, 0.15);
    box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.4), 0 20px 40px rgba(0,0,0,0.2);
    backdrop-filter: blur(8px);
  }
  .model {
    width: 100%; height: 100%;
    object-fit: cover; object-position: bottom center;
  }

  /* 장식별(Stars) */
  .star {
    position: absolute; width: 30px; height: 30px; z-index: 20; opacity: 0.8;
  }
  /* 별을 CSS로 그리기 (십자선 기반) */
  .star::before, .star::after {
    content: ''; position: absolute; background: var(--text-color);
  }
  .star::before { top: 14px; left: 0; width: 30px; height: 2px; }
  .star::after { top: 0; left: 14px; width: 2px; height: 30px; }

  /* 별 위치 임의 지정 */
  .star-1 { left: 160px; top: 280px; transform: scale(1.5) rotate(45deg); opacity: 0.5;}
  .star-2 { right: 180px; top: 320px; transform: scale(1.2); opacity: 0.6;}
  .star-3 { right: 140px; top: 620px; transform: scale(2) rotate(15deg); opacity: 0.7;}
  .star-4 { left: 180px; top: 580px; transform: scale(1) rotate(60deg); opacity: 0.4;}

  /* 브랜드명 - 상단 중앙 */
  .brand-en {
    position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
    font-family: 'NotoSerif', serif; font-size: 34px;
    letter-spacing: 16px; z-index: 20; color: var(--text-color); opacity: 0.7;
    text-transform: uppercase;
  }

  /* 수직 텍스트 장식 */
  .vertical-text-left, .vertical-text-right {
    position: absolute; top: 50%; transform: translateY(-50%) rotate(-90deg);
    font-family: 'NotoSerif', serif; font-size: 24px; opacity: 0.5;
    letter-spacing: 8px; text-transform: uppercase; z-index: 5;
  }
  .vertical-text-left { left: 80px; }
  .vertical-text-right { right: 80px; transform: translateY(-50%) rotate(90deg); }

  /* 메인 헤드라인 - 아치 프레임 하단을 덮음 */
  .headline-area {
    position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
    z-index: 30; text-align: center; width: 1000px;
  }
  .headline {
    font-family: 'NotoSerif', serif; /* 세리프 폰트로 우아하게 */
    font-size: var(--headline-size);
    font-weight: 700; color: var(--text-color);
    letter-spacing: 8px; line-height: 1;
    text-shadow: 0 10px 20px rgba(0,0,0,0.1);
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}

  /* 가격 - 미니멀하게 */
  .price-area {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 30; display: {{PRICE_DISPLAY}}}}; align-items: baseline; justify-content: center;
  }
  .price-value {
    font-family: 'Bebas', 'Noto', sans-serif; font-size: var(--price-size);
    font-weight: 500; letter-spacing: 2px;
  }
  .price-unit {
    font-family: 'Noto', sans-serif; font-size: calc(var(--price-size) * 0.4); margin-left: 6px; opacity: 0.6;
  }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <!-- 배경 라인 -->
  <div class="grid-lines"></div>
  <div class="vertical-line-left"></div>
  <div class="vertical-line-right"></div>

  <!-- 브랜드 -->
  <div class="brand-en">{{BRAND_EN}}</div>
  
  <div class="vertical-text-left">{{TAGLINE}}</div>
  <div class="vertical-text-right">{{TAGLINE}}</div>

  <!-- 모델 아치 프레임 -->
  <div class="arch-frame">
    <img class="model" src="{{MODEL_PATH}}" id="model-img">
  </div>

  <!-- 장식 별 -->
  <div class="star star-1"></div>
  <div class="star star-2"></div>
  <div class="star star-3"></div>
  <div class="star star-4"></div>

  <!-- 텍스트/가격 -->
  <div class="headline-area">
    <div class="headline" id="headline">{{HEADLINE}}</div>
  </div>

  <div class="price-area">
    <span class="price-value" id="price">{{PRICE}}</span>
    <span class="price-unit">{{PRICE_UNIT}}</span>
  </div>
</body>
</html>
