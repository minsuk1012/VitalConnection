<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  {{FONT_FACES}}
              * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px; overflow: hidden; position: relative;
    background: var(--bg-color);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  /* 배경 장식 원 */
  .bg-circle {
    position: absolute;
    width: var(--bg-circle-size); height: var(--bg-circle-size);
    border-radius: 50%;
    background: var(--bg-circle-color);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.3;
  }
  /* 브랜드 — 상단 */
  .brand-area {
    position: absolute; top: 36px; left: 50%;
    transform: translateX(-50%); text-align: center;
  }
  .brand-en {
    font-family: 'Bebas'; font-size: var(--brand-size);
    color: var(--text-color); letter-spacing: 3px; opacity: 0.8;
  }
  /* 서브헤드 — 원 위 */
  .subheadline {
    position: absolute;
    top: var(--sub-top); left: 50%; transform: translateX(-50%);
    font-family: 'NotoSerif', serif; font-size: var(--sub-size);
    color: var(--text-color); opacity: 0.9; text-align: center;
    font-style: italic; letter-spacing: 1px;
    white-space: nowrap; display: {{SUB_DISPLAY}};
    rotate: var(--sub-rotation, 0deg);
    left: var(--sub-left, 50%);
  }
  /* 원형 프레임 */
  .circle-frame {
    position: relative;
    width: var(--circle-size); height: var(--circle-size);
    border-radius: 50%; overflow: hidden;
    border: var(--circle-border);
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    margin-top: var(--circle-margin-top);
  }
  .model {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
  }
  /* 헤드라인 — 원 아래 */
  .headline {
    position: absolute;
    bottom: var(--headline-bottom); left: 50%; transform: translateX(-50%);
    font-family: 'Bebas', 'Noto', sans-serif; font-size: var(--headline-size);
    font-weight: 900; color: var(--text-color);
    text-align: center; word-break: keep-all; white-space: nowrap;
    letter-spacing: 1px;
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}
  /* 가격 — 최하단 */
  .price-area {
    position: absolute;
    bottom: var(--price-bottom); left: 50%; transform: translateX(-50%);
    text-align: center; display: {{PRICE_DISPLAY}}
  }
  .price-value {
    font-family: 'Bebas', 'Noto', sans-serif; font-size: var(--price-size);
    font-weight: bold;
    color: var(--accent-color); letter-spacing: 1px;
  }
  .price-unit {
    font-family: 'Noto'; font-size: calc(var(--price-size) * 0.38);
    font-weight: bold;
    color: var(--text-color); margin-left: 4px; vertical-align: middle; opacity: 0.8;
  }

  /* === 에디터 커스텀 오버라이드 === */
  .subheadline { rotate: var(--sub-rotation, 0deg); margin-top: var(--sub-margin-top, 0px); }

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { line-height: var(--headline-line-height, 1.2); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <div class="bg-circle"></div>
  <div class="brand-area"><div class="brand-en" id="brand-en">{{BRAND_EN}}</div></div>
  <div class="subheadline" id="subheadline">{{SUBHEADLINE}}</div>
  <div class="circle-frame">
    <img class="model" src="{{MODEL_PATH}}" id="model-img">
  </div>
  <div class="headline" id="headline">{{HEADLINE}}</div>
  <div class="price-area">
    <span class="price-value" id="price">{{PRICE}}</span>
    <span class="price-unit">{{PRICE_UNIT}}</span>
  </div>
</body>
</html>
