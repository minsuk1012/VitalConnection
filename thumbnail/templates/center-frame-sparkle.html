<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  :root { {{CSS_VARS}} }
  @font-face { font-family: 'Bebas'; src: url('{{FONTS_DIR}}/BebasNeue-Regular.ttf'); }
  @font-face { font-family: 'Noto'; src: url('{{FONTS_DIR}}/NotoSansKR.ttf'); }
  @font-face { font-family: 'NotoSerif'; src: url('{{FONTS_DIR}}/NotoSerif-Regular.ttf'); }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px; overflow: hidden; position: relative;
    background: radial-gradient(circle at 50% 50%, #fff 0%, var(--bg-color) 100%);
  }

  /* 보케(Bokeh) 효과 장식 배경 */
  .bokeh {
    position: absolute; border-radius: 50%; background: rgba(255, 255, 255, 0.4);
    filter: blur(20px); z-index: 1; pointer-events: none;
  }
  .bokeh-1 { width: 150px; height: 150px; left: 100px; top: 150px; }
  .bokeh-2 { width: 300px; height: 300px; right: -50px; top: 300px; }
  .bokeh-3 { width: 250px; height: 250px; left: -50px; bottom: 200px; }

  /* 얇은 프레임 라인 장식 */
  .deco-line {
    position: absolute; border-radius: 50%;
    border: 2px solid var(--text-color); opacity: 0.8;
    z-index: 2; pointer-events: none;
  }
  .deco-line-1 {
    width: 900px; height: 1100px; top: -50px; left: 150px;
    border-color: transparent var(--text-color) transparent transparent;
    transform: rotate(15deg);
  }

  /* 별 장식 */
  .star { position: absolute; width: 60px; height: 60px; z-index: 20; }
  .star::before, .star::after { content: ''; position: absolute; background: var(--text-color); }
  .star::before { top: 28px; left: 0; width: 60px; height: 4px; border-radius: 2px; }
  .star::after { top: 0; left: 28px; width: 4px; height: 60px; border-radius: 2px; }
  /* 안에 흰 별 모양 뚫기 방지 대신 간단한 십자 + 중앙 다이아몬드(흰테두리) */
  .star { filter: drop-shadow(0 0 5px white) drop-shadow(0 0 5px white); }

  .star-1 { left: 150px; top: 250px; transform: scale(1.2); }
  .star-2 { right: 80px; top: 550px; transform: scale(1.3); }

  /* 중앙 거대 타원 프레임 */
  .oval-frame {
    position: absolute;
    top: 50px; left: 50%;
    transform: translateX(-50%);
    width: 820px; height: 900px;
    border-radius: 50%;
    overflow: hidden;
    z-index: 10;
    border: 2px solid var(--text-color);
    box-shadow: 0 30px 60px rgba(0,0,0,0.15);
  }
  .model {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
  }

  /* 좌상단 뱃지 (1회 등) */
  .tagline-bubble {
    position: absolute;
    top: 100px; left: 120px;
    background: radial-gradient(circle at top left, #fff, #FFF7DC);
    border: 4px solid var(--text-color);
    border-radius: 50px;
    padding: 10px 40px;
    font-family: 'Noto', sans-serif;
    font-size: 55px; font-weight: 900;
    color: var(--text-color);
    z-index: 25;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    display: {{TAGLINE_DISPLAY}}
  }
  /* 버블 옆 작은 원 들 (구름모양처럼) */
  .tagline-bubble::before {
    content:''; position:absolute; width:40px; height:40px;
    border:4px solid var(--text-color); border-radius:50%;
    top: 10px; left: -20px; background:#fff; z-index:-1;
  }
  .tagline-bubble::after {
    content:''; position:absolute; width:30px; height:30px;
    border:4px solid var(--text-color); border-radius:50%;
    top: -15px; left: 10px; background:#fff; z-index:-1;
  }

  /* 거대 헤드라인 영역 */
  .headline-container {
    position: absolute;
    bottom: 60px; left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    text-align: center;
    width: 1000px;
  }
  
  .brand-en {
    font-family: 'NotoSerif', serif; font-size: 130px;
    color: var(--text-color); font-weight: 900;
    letter-spacing: 5px; line-height: 0.9;
    -webkit-text-stroke: var(--brand-stroke-width, 10px) var(--stroke-color, white);
    paint-order: stroke fill;
    margin-bottom: 5px;
  }

  .headline {
    font-family: var(--headline-font, 'NotoSerif'), serif; font-size: var(--headline-size);
    color: var(--text-color); font-weight: 900;
    letter-spacing: var(--headline-letter-spacing, -2px); line-height: 1.1;
    -webkit-text-stroke: var(--stroke-width, 16px) var(--stroke-color, white);
    paint-order: stroke fill;
    word-break: keep-all; text-shadow: 0 10px 20px rgba(0,0,0,0.2);
    rotate: var(--headline-rotation, 0deg);
    max-width: var(--headline-max-width, 900px);}

  /* === 에디터 커스텀 오버라이드 ===*/
  .model { opacity: var(--model-opacity, 1); filter: brightness(var(--model-brightness, 1)); }
  .headline { z-index: var(--headline-z-index, 5); }
  .headline { opacity: var(--headline-opacity, 1); }
</style>
</head>
<body>
  <!-- 후경 보케 & 라인 -->
  <div class="bokeh bokeh-1"></div>
  <div class="bokeh bokeh-2"></div>
  <div class="bokeh bokeh-3"></div>
  <div class="deco-line deco-line-1"></div>

  <!-- 별 장식 -->
  <div class="star star-1"></div>
  <div class="star star-2"></div>

  <!-- 좌상단 구름 버블 태그라인 -->
  <div class="tagline-bubble">{{TAGLINE}}</div>

  <!-- 타원 이미지 프레임 -->
  <div class="oval-frame">
    <img class="model" src="{{MODEL_PATH}}" id="model-img">
  </div>

  <!-- 거대 타이포그래피 -->
  <div class="headline-container">
    <div class="brand-en">{{BRAND_EN}}</div>
    <div class="headline" id="headline">{{HEADLINE}}</div>
  </div>

</body>
</html>
